<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="game-wrap">
    <div id="stats">
      level: <span id="level">1</span>
      &nbsp;&nbsp;
      moves: <span id="moves">0</span>
      &nbsp;&nbsp;
      total: <span id="total">0</span>
      &nbsp;&nbsp;
      time: <span id="timer">0.000s</span>
    </div>

    <!-- Canvas wrapped so we can scale it on small screens -->
    <div id="canvas-wrap">
      <canvas id="canvas" width="500" height="500" tabindex="0"></canvas>
    </div>

    <div id="msg">use arrow keys or WASD to move</div>

    <!-- Touch controller — hidden on desktop, shown on iOS/touch -->
    <div id="touch-controller">
      <div class="zone" id="zone-up">▲</div>
      <div id="touch-middle">
        <div class="zone" id="zone-left">◀</div>
        <div class="zone" id="zone-right">▶</div>
      </div>
      <div class="zone" id="zone-down">▼</div>
    </div>

    <div id="buttons">
      <button onclick="restartGame()">restart game</button>
      <button onclick="nextLevel()">next level</button>
      <!-- DEV ONLY — remove before shipping -->
      <select id="level-select" onchange="jumpToLevel(this.value)">
      </select>
    </div>
  </div>

  <!-- Score screen — hidden until game complete -->
  <div id="score-screen" style="display:none;">
    <div id="score-box">
      <div id="score-title">game complete</div>
      <div class="score-row">moves <span id="final-moves">0</span></div>
      <div class="score-row">time <span id="final-time">0.000s</span></div>
      <div class="score-row">time penalty <span id="final-penalty">0</span></div>
      <div class="score-divider"></div>
      <div class="score-row score-total">score <span id="final-score">0</span></div>
      <div id="score-note">lower is better</div>
      <button onclick="restartGame()">play again</button>
    </div>
  </div>

  <script>
    // Scale the canvas to fit the screen without distorting the drawing context
    function scaleCanvas() {
      const wrap = document.getElementById('canvas-wrap');
      const canvas = document.getElementById('canvas');
      const available = wrap.clientWidth;
      const scale = Math.min(1, available / 500);
      canvas.style.transform = `scale(${scale})`;
      canvas.style.transformOrigin = 'top left';
      wrap.style.height = (500 * scale) + 'px';
    }
    window.addEventListener('resize', scaleCanvas);
    window.addEventListener('load', scaleCanvas);
  </script>

  <script src="levels.js"></script>
  <script src="game.js"></script>

</body>
</html>
